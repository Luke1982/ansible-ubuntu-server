---
# Web role tasks

- name: Install certbot
  apt:
    pkg:
      - certbot
    state: present

- include_tasks: setup-openlitespeed.yml

- name: Enable Ondrej PHP PPA
  apt_repository:
    repo: ppa:ondrej/php
    state: present

- name: Install PHP and some PHP modules
  apt:
    pkg:
      - php8.3
      - php8.3-fpm
      - php8.3-cli
      - php8.3-mysql
      - php8.3-gd
      - php8.3-imagick
      - php8.3-xml
      - php8.3-zip
      - php8.3-intl
      - php8.3-mbstring
      - php8.3-curl
      - php8.3-imap
    state: present

- name: Create Let's Encrypt's live directory
  file:
    path: /etc/letsencrypt/live
    state: directory
    owner: root
    group: root
    mode: 0600

- include_tasks: setup-php-fpm.yml